<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 | 焙煎待ち時間</title>
    <link rel="stylesheet" href="./style.css?v=20260410-admin2" />
  </head>
  <body>
    <main class="page admin-page">
      <section id="auth-gate" class="card auth-card">
        <p class="eyebrow">MANAGEMENT LOGIN</p>
        <h1 class="section-title">管理者ログイン</h1>
        <p class="section-description">Firebase Authentication でログインしてください。</p>

        <form id="login-form" class="pin-form" action="javascript:void(0);" onsubmit="return false;">
          <input
            id="email-input"
            class="input"
            type="email"
            placeholder="メールアドレス"
            autocomplete="username"
          />
          <input
            id="password-input"
            class="input"
            type="password"
            placeholder="パスワード"
            autocomplete="current-password"
          />
          <button id="login-button" type="button" class="button button-primary">ログイン</button>
        </form>

        <p id="login-error" class="error-message"></p>
      </section>

      <section id="pin-gate" class="card auth-card hidden">
        <p class="eyebrow">MANAGEMENT PIN</p>
        <h1 class="section-title">PIN確認</h1>
        <p class="section-description">4桁のPINを入力してください。</p>

        <form id="pin-form" class="pin-form" action="javascript:void(0);" onsubmit="return false;">
          <input
            id="pin-input"
            class="input pin-input"
            type="password"
            inputmode="numeric"
            maxlength="4"
            placeholder="4桁PIN"
            autocomplete="off"
          />
          <button id="pin-button" type="button" class="button button-primary">入室</button>
        </form>

        <p id="pin-error" class="error-message"></p>
      </section>

      <section id="admin-panel" class="admin-panel hidden">
        <header class="page-header">
          <div>
            <p class="eyebrow">MANAGEMENT</p>
            <h1 class="section-title">焙煎待ち時間 管理画面</h1>
          </div>
          <div class="header-actions">
            <a class="button button-secondary" href="./history.html">履歴画面へ</a>
            <button id="logout-button" class="button button-danger" type="button">ログアウト</button>
          </div>
        </header>

        <section class="stats-grid compact-grid">
          <article class="card stat-card stat-card-large">
            <p class="stat-label">現在の焙煎待ち時間</p>
            <p id="admin-current-wait" class="stat-value">--</p>
            <p id="admin-next-decay" class="stat-helper">次の自動減少目安: --</p>
          </article>

          <article class="card stat-card">
            <p class="stat-label">現在の営業状態</p>
            <p id="admin-open-status" class="stat-value stat-value-small">--</p>
          </article>

          <article class="card stat-card">
            <p class="stat-label">現在の有効件数</p>
            <p id="admin-active-orders" class="stat-value stat-value-small">--</p>
          </article>
        </section>

        <section class="card">
          <h2 class="card-title">操作</h2>
          <div class="button-grid">
            <button id="add-order-button" class="button button-primary button-big">注文追加</button>
            <button id="cancel-order-button" class="button button-warning button-big">取消</button>
            <button id="minus-one-minute-button" class="button button-secondary button-big">1分減らす</button>
            <button id="plus-one-minute-button" class="button button-secondary button-big">1分増やす</button>
            <button id="open-reception-button" class="button button-success button-big">受付開始</button>
            <button id="close-reception-button" class="button button-danger button-big">受付終了</button>
          </div>
          <p id="admin-action-message" class="action-message"></p>
        </section>

        <section class="card">
          <h2 class="card-title">設定</h2>
          <form id="settings-form" class="settings-form" action="javascript:void(0);" onsubmit="return false;">
            <label class="field">
              <span class="field-label">1件あたり加算時間（分）</span>
              <input id="per-order-minutes" class="input" type="number" min="1" step="1" />
            </label>
            <label class="field">
              <span class="field-label">減少開始ラグ（分）</span>
              <input id="decay-lag-minutes" class="input" type="number" min="0" step="1" />
            </label>
            <label class="field">
              <span class="field-label">減少刻み時間（分）</span>
              <input id="decay-step-minutes" class="input" type="number" min="1" step="1" />
            </label>
            <button id="save-settings-button" type="button" class="button button-primary">設定を保存</button>
          </form>
          <p id="current-settings-text" class="action-message"></p>
        </section>
      </section>
    </main>

    <script type="module" src="./admin.js?v=20260410-admin2"></script>
  </body>
</html>
